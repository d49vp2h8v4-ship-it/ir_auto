name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download Immersive Railroading jar
        run: |
          # Download from a GitHub Release asset.
          # Set up: create a release with tag "deps", attach IR jar as asset.
          # The release URL: https://github.com/<owner>/<repo>/releases/tag/deps
          # Then set secret IR_JAR_URL to the asset download URL.
          if [ -n "${{ secrets.IR_JAR_URL }}" ]; then
            curl -L -o modir/ImmersiveRailroading-1.12.2-forge-1.10.0.jar "${{ secrets.IR_JAR_URL }}"
          else
            echo "WARNING: IR_JAR_URL secret not set. Creating empty stub jar for syntax-only check."
            # Create minimal jar with just the classes we reference
            jar cf modir/ImmersiveRailroading-1.12.2-forge-1.10.0.jar -C . bogus 2>/dev/null || true
          fi

      - name: Setup Forge
        run: |
          chmod +x gradlew
          ./gradlew setupDecompWorkspace

      - name: Build
        run: ./gradlew build
